name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch: # GitHub 웹페이지에서 수동 배포 버튼 활성화

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          command_timeout: 360m
          script: |
            # 1GB RAM 인스턴스를 위한 4GB Swap 메모리 생성 (메모리 부족으로 인한 dnf Killed 방지)
            if [ ! -f /swapfile ]; then
              echo "스왑 메모리를 생성합니다..."
              sudo dd if=/dev/zero of=/swapfile bs=1M count=4096
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
            fi
            
            # Git이 없으면 자동 설치
            if ! command -v git &> /dev/null; then
              echo "Git을 설치합니다..."
              sudo dnf install -y --nogpgcheck git
            fi
            
            # 디렉토리 체크 및 클론
            if [ ! -d "$HOME/video_pipeline" ]; then
              cd $HOME
              git clone https://github.com/sth00619/video_pipeline.git
            fi
            
            cd $HOME/video_pipeline
            git fetch --all
            git reset --hard origin/main
            
            # .env 파일 생성
            cat > .env << 'EOF'
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            FINNHUB_API_KEY=${{ secrets.FINNHUB_API_KEY }}
            EOF
            
            # Docker가 없으면 자동 설치 (최초 1회, Oracle Linux 호환)
            if ! command -v docker &> /dev/null; then
              echo "Docker를 설치합니다..."
              sudo dnf config-manager --add-repo https://download.docker.com/linux/centos/docker-ce.repo
              sudo dnf install -y --nogpgcheck docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
              sudo systemctl start docker
              sudo systemctl enable docker
              sudo usermod -aG docker opc
              
              # 방화벽 오픈 (최초 1회)
              sudo firewall-cmd --zone=public --add-port=3000/tcp --permanent || true
              sudo firewall-cmd --zone=public --add-port=8080/tcp --permanent || true
              sudo firewall-cmd --zone=public --add-port=8001/tcp --permanent || true
              sudo firewall-cmd --reload || true
            fi
            
            # 혹시 모를 기존 충돌 컨테이너 및 네트워크 강제 정리
            sudo docker rm -f pipeline_postgres pipeline_redis pipeline_minio pipeline_fastapi pipeline_fastapi_workers pipeline_spring_app pipeline_frontend || true
            sudo docker network rm video_pipeline_default || true
            
            # Docker Compose 재시작 (sudo 권한 부여)
            sudo docker compose down --remove-orphans
            sudo docker compose up -d --build
            
            # 헬스체크
            sleep 10
            echo "=== 배포 완료 ==="
            sudo docker compose ps
