services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_video_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
  minio:
    image: minio/minio:latest
    container_name: pipeline_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'

  # ══════════════════════════════════════════════════════════
  # 신규 — Temporal (Job 오케스트레이션 엔진, Phase 0)
  #
  # 기존 postgres 컨테이너를 그대로 재사용합니다. auto-setup 이미지가
  # 최초 기동 시 자체적으로 "temporal", "temporal_visibility" 데이터베이스를
  # 만듭니다 (pipeline_user가 이 Postgres 인스턴스의 최초 관리자 계정이라
  # DB 생성 권한이 있음). 별도 Postgres 컨테이너를 안 띄워도 됩니다.
  # ══════════════════════════════════════════════════════════
  temporal:
    image: temporalio/auto-setup:1.24
    container_name: pipeline_temporal
    restart: unless-stopped
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: pipeline_user
      POSTGRES_PWD: ${SPRING_DATASOURCE_PASSWORD}
      POSTGRES_SEEDS: postgres
    ports:
      - '7233:7233'   # gRPC — Spring Boot 워커/클라이언트가 이 포트로 접속
    depends_on:
      - postgres

  temporal-ui:
    image: temporalio/ui:2.31.2
    container_name: pipeline_temporal_ui
    restart: unless-stopped
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - '8233:8080'   # 8080은 spring-app이 이미 쓰고 있어서 8233으로 변경
    depends_on:
      - temporal

  spring-app:
    build:
      context: ./backend
      dockerfile: spring-app/Dockerfile
    container_name: pipeline_spring
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_video_pipeline
      SPRING_DATASOURCE_USERNAME: pipeline_user
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_SECRET_KEY: ${APP_SECRET_KEY}
      FASTAPI_URL: http://fastapi-workers:8001
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 500MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 500MB
      # 신규 — Temporal 연결
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_NAMESPACE: default
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      fastapi-workers:
        condition: service_healthy
      temporal:
        condition: service_started
    volumes:
      - fastapi_data:/app/data   # FastAPI 생성 파일 공유 (다운로드 프록시용)
  fastapi-workers:
    build:
      context: ./backend
      dockerfile: fastapi-workers/Dockerfile
    container_name: pipeline_fastapi
    restart: unless-stopped
    ports:
      - '8001:8001'
    environment:
      APP_MODE: production
      REDIS_HOST: redis
      REDIS_PORT: 6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      KEYWORD_MIN_SOURCE_SUBSCRIBERS: ${KEYWORD_MIN_SOURCE_SUBSCRIBERS:-3000}
      KEYWORD_MIN_SOURCE_VIEWS: ${KEYWORD_MIN_SOURCE_VIEWS:-500}
      KEYWORD_MIN_SOURCE_VIEWER_MULTIPLE: ${KEYWORD_MIN_SOURCE_VIEWER_MULTIPLE:-0.01}
      KEYWORD_EXCLUDE_LIVE: ${KEYWORD_EXCLUDE_LIVE:-true}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-d951j4pr01qq8ms6uaa0d951j4pr01qq8ms6uaag}
      FRED_API_KEY: ${FRED_API_KEY:-}
      DART_API_KEY: ${DART_API_KEY:-}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID:-}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET:-}
      ARTICLE_EVIDENCE_AUTO_ENABLED: ${ARTICLE_EVIDENCE_AUTO_ENABLED:-true}
      EVIDENCE_MAX_SCENES: ${EVIDENCE_MAX_SCENES:-2}
      EVIDENCE_MAX_SEARCHES_PER_SCENE: ${EVIDENCE_MAX_SEARCHES_PER_SCENE:-3}
      EVIDENCE_MIN_SENTENCE_SIMILARITY: ${EVIDENCE_MIN_SENTENCE_SIMILARITY:-0.85}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-dlKJ5VptCbYxal4doUO5}
      ELEVENLABS_TTS_MODEL: ${ELEVENLABS_TTS_MODEL:-eleven_v3}
      KLING_API_KEY: ${KLING_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_PRO_BATCH_ENABLED: ${GEMINI_PRO_BATCH_ENABLED:-false}
      GEMINI_PRO_BATCH_FALLBACK_ENABLED: ${GEMINI_PRO_BATCH_FALLBACK_ENABLED:-false}
      GEMINI_SERVICE_TIER: ${GEMINI_SERVICE_TIER:-standard}
      GEMINI_PRO_MAX_ATTEMPTS: ${GEMINI_PRO_MAX_ATTEMPTS:-5}
      GEMINI_PRO_RETRY_BASE_SECONDS: ${GEMINI_PRO_RETRY_BASE_SECONDS:-10}
      GEMINI_PRO_REQUEST_DELAY_SECONDS: ${GEMINI_PRO_REQUEST_DELAY_SECONDS:-3}
      GEMINI_PARALLEL_ENABLED: ${GEMINI_PARALLEL_ENABLED:-true}
      GEMINI_MAX_CONCURRENCY: ${GEMINI_MAX_CONCURRENCY:-6}
      GEMINI_RETRY_MAX: ${GEMINI_RETRY_MAX:-3}
      IMAGE_SAME_ERROR_BREAK_COUNT: ${IMAGE_SAME_ERROR_BREAK_COUNT:-5}
      LONGFORM_SCENE_MAX_WORKERS: ${LONGFORM_SCENE_MAX_WORKERS:-2}
      ANTHROPIC_PROMPT_CACHE_ENABLED: ${ANTHROPIC_PROMPT_CACHE_ENABLED:-true}
      ANTHROPIC_PROMPT_CACHE_TTL: ${ANTHROPIC_PROMPT_CACHE_TTL:-5m}
      TTS_SPEED: ${TTS_SPEED:-1.0}
      TTS_SENTENCE_PAUSE_MS: ${TTS_SENTENCE_PAUSE_MS:-350}
      TTS_PARAGRAPH_PAUSE_MS: ${TTS_PARAGRAPH_PAUSE_MS:-400}
      CHARS_PER_MINUTE: ${CHARS_PER_MINUTE:-400}
      FAL_KEY: ${FAL_KEY:-}
      # v2 is enabled for newly generated briefs; old jobs without a v2
      # contract remain on the legacy renderer for a safe migration.
      THUMBNAIL_V2_ENABLED: ${THUMBNAIL_V2_ENABLED:-true}
      THUMBNAIL_HEADLINE_MAX_LINES: ${THUMBNAIL_HEADLINE_MAX_LINES:-4}
      THUMBNAIL_HEADLINE_MIN_FONT_PX: ${THUMBNAIL_HEADLINE_MIN_FONT_PX:-64}
      ARTICLE_ALLOWED_PUBLISHERS_ONLY: ${ARTICLE_ALLOWED_PUBLISHERS_ONLY:-true}
      SCENE_REVEAL_ENABLED: ${SCENE_REVEAL_ENABLED:-true}
    depends_on:
      - redis
      - minio
    volumes:
      - fastapi_data:/app/data
    mem_limit: 4g
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pipeline_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    environment:
      BACKEND_URL: http://spring-app:8080
    depends_on:
      - spring-app
volumes:
  postgres_data:
  minio_data:
  fastapi_data:
