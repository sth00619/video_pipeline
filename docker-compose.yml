services:
  postgres:
    image: postgres:16-alpine
    container_name: pipeline_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_video_pipeline
      POSTGRES_USER: pipeline_user
      POSTGRES_PASSWORD: pass1234
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: pipeline_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: pipeline_minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    command: server /data --console-address ':9001'

  spring-app:
    build:
      context: ./backend/spring-app
      dockerfile: Dockerfile
    container_name: pipeline_spring
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ai_video_pipeline
      SPRING_DATASOURCE_USERNAME: pipeline_user
      SPRING_DATASOURCE_PASSWORD: pass1234
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_MODE: local
      APP_SECRET_KEY: video-pipeline-jwt-secret-key-must-be-32chars-minimum-2026!!
    depends_on:
      - postgres
      - redis

  fastapi-workers:
    build:
      context: ./backend/fastapi-workers
      dockerfile: Dockerfile
    container_name: pipeline_fastapi
    restart: unless-stopped
    ports:
      - '8001:8001'
    environment:
      APP_MODE: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET_NAME: ai-video-assets
    depends_on:
      - redis
      - minio
    volumes:
      - ./backend/fastapi-workers:/app

volumes:
  postgres_data:
  minio_data:
