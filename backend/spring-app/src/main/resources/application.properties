app.secret-key=video-pipeline-jwt-secret-key-must-be-32chars-minimum-2026!!
fastapi.url=http://fastapi-workers:8001
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
