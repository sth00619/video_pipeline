spring.application.name=video-pipeline
server.port=${SERVER_PORT:8080}

# DB - Render의 DATABASE_URL 환경변수를 우선 사용, 없으면 SPRING_DATASOURCE_URL, 없으면 로컬 기본값
# Render가 제공하는 connectionString은 postgresql:// 형식이므로 jdbc: 접두사를 명시적으로 붙여서 처리
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ai_video_pipeline}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipeline_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Dialect 명시 (환경변수 파싱 실패시에도 명확하게 PostgreSQL 방언 사용)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# App
app.mode=${APP_MODE:local}
app.secret-key=${APP_SECRET_KEY:video-pipeline-jwt-secret-key-must-be-32chars-minimum-2026!!}
fastapi.url=${FASTAPI_URL:http://fastapi-workers:8001}

# Multipart
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# UTF-8 인코딩 전면 강제 (한글 깨짐 방지)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.jpa.open-in-view=false
