spring.application.name=video-pipeline
server.port=${SERVER_PORT:8080}

# DB - Render의 DATABASE_URL 환경변수를 우선 사용, 없으면 SPRING_DATASOURCE_URL, 없으면 로컬 기본값
# Render가 제공하는 connectionString은 postgresql:// 형식이므로 jdbc: 접두사를 명시적으로 붙여서 처리
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ai_video_pipeline}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipeline_user}
# [보안 수정] 기존 ${SPRING_DATASOURCE_PASSWORD:pass1234} — 환경변수 누락 시 소스코드에
# 박힌 고정 비밀번호로 조용히 기동되던 문제. 필수값으로 바꿔서 누락되면 즉시 기동 실패하게 함
# (운영 DB가 인터넷에 노출되지 않는 구성이라도, "조용히 약한 기본값으로 도는 것"보다는
#  "설정을 안 했다는 걸 바로 알아차리는 것"이 훨씬 안전합니다).
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Dialect 명시 (환경변수 파싱 실패시에도 명확하게 PostgreSQL 방언 사용)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# App
app.mode=${APP_MODE:local}
# [보안 수정 - 중요] 기존 ${APP_SECRET_KEY:video-pipeline-jwt-secret-key-must-be-32chars-minimum-2026!!}
# 이 리포지토리는 GitHub(sth00619/video_pipeline)에 있으므로, 이 하드코딩된 폴백값은
# 사실상 "공개된 JWT 서명 키"였습니다. APP_SECRET_KEY 환경변수를 배포 환경(.env,
# Railway 설정 등)에 설정하지 않으면 이 고정 문자열로 서명되고, 이 문자열을 아는
# 사람은 누구나 ADMIN 권한 JWT를 직접 만들어 낼 수 있습니다.
# 반드시 .env에 APP_SECRET_KEY=(32자 이상 무작위 문자열)을 설정하세요.
# 설정을 안 하면 Spring Boot가 기동 시점에 바로 에러를 내며 죽습니다 (의도된 동작 —
# 조용히 취약한 기본값으로 뜨는 것보다 훨씬 안전합니다).
app.secret-key=${APP_SECRET_KEY}
fastapi.url=${FASTAPI_URL:http://fastapi-workers:8001}

# Multipart
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# UTF-8 인코딩 전면 강제 (한글 깨짐 방지)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.jpa.open-in-view=false

spring.temporal.connection.target=${TEMPORAL_ADDRESS:temporal:7233}
spring.temporal.namespace=${TEMPORAL_NAMESPACE:default}
spring.temporal.workers-auto-discovery.packages=com.pipeline.video.workflow
