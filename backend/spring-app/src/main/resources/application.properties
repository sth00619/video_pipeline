spring.application.name=video-pipeline
server.port=8080

# DB
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/ai_video_pipeline}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:pipeline_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:pass1234}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Redis
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:redis}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# App
app.mode=local
app.secret-key=video-pipeline-jwt-secret-key-must-be-32chars-minimum-2026!!
fastapi.url=http://fastapi-workers:8001

# Multipart
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# UTF-8 인코딩 전면 강제 (한글 깨짐 방지)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true
spring.jpa.open-in-view=false
